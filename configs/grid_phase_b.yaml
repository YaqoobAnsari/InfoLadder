# Phase B probing campaign — the full grid (plan §6, §7; ROADMAP B-1)
# {R0..R4} x {targets} x {V0..V6} x 3 seeds x best-of-3 restarts  (~450 registered runs)
# Runner not yet implemented — requires corpus (DATA-1..3) and labels (A-1..A-6).
experiment: grid_phase_b
seed: 20260714
device: cpu
workers: 8                # 10-core CPU host; leave headroom (CLAUDE.md §Environment)

datasets: [structured3d, cubicasa, msd]   # + instbuild as held-out stress set
levels: [0, 1, 2, 3, 4]
targets: [y_pde, y_zone, y_rank, y_egress, y_type, y_ctrl]
families: [V0, V1, V2, V3, V4, V5, V6]
seeds: [0, 1, 2]
n_restarts: 3
mdl: true

oracle_skylines: true     # plan §8: hand-constructed oracle features per target
split:
  scheme: building_level  # NEVER floor-level (plan §9)
  ratios: [0.7, 0.15, 0.15]
  stratify_by: [dataset, size_decile]
